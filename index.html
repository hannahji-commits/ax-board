<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AX 우선순위 보드</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #F8F9FB;
    min-height: 100vh;
    overflow: hidden;
  }

  .header {
    background: linear-gradient(90deg, #F25C05 0%, #FE9A00 100%);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    position: relative;
  }
  .header h1 { font-size: 16px; font-weight: 900; color: #FFF; }
  .header .hint { font-size: 11px; color: rgba(255,255,255,0.8); }
  .header-actions { display: flex; gap: 8px; }
  .header-btn {
    padding: 7px 14px;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
  }
  .header-btn.primary { background: #FFF; color: #F25C05; }
  .header-btn.secondary { background: rgba(255,255,255,0.2); color: #FFF; }
  .header-btn.danger { background: rgba(255,80,80,0.3); color: #FFF; }
  .header-btn.active { outline: 2px solid #FFF; outline-offset: 2px; }

  .mode-indicator {
    position: fixed; top: 56px; left: 50%; transform: translateX(-50%);
    background: #0F172A; color: #FFF; padding: 8px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 700; z-index: 200; display: none;
  }
  .mode-indicator.show { display: block; }

  .board {
    position: relative;
    width: 100vw;
    height: calc(100vh - 48px);
    overflow: auto;
  }

  .arrow-layer {
    position: absolute; top: 0; left: 0;
    width: 5000px; height: 4000px;
    pointer-events: none; z-index: 1;
  }
  .arrow-layer path { pointer-events: stroke; cursor: pointer; }

  /* 블록 공통 */
  .block {
    position: absolute;
    border-radius: 12px;
    padding: 12px 16px;
    cursor: grab;
    z-index: 10;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    user-select: none;
    white-space: nowrap;
  }
  .block:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .block.dragging { cursor: grabbing; box-shadow: 0 12px 32px rgba(0,0,0,0.18); z-index: 50; opacity: 0.92; }

  /* 주요 블록 */
  .block.major {
    background: #FFF4ED;
    border: 2px solid #F25C05;
  }
  .block.major .block-label { font-size: 14px; font-weight: 800; color: #D4500A; }
  .block.major .block-desc { font-size: 11px; color: #9A6840; margin-top: 2px; }

  /* 하위 블록 */
  .block.minor {
    background: #FFFFFF;
    border: 1.5px solid #D8DCE2;
  }
  .block.minor .block-label { font-size: 13px; font-weight: 600; color: #334155; }
  .block.minor .block-desc { font-size: 11px; color: #64748B; margin-top: 2px; }

  .block .block-label, .block .block-desc { outline: none; line-height: 1.4; }
  .block .block-label[contenteditable="true"],
  .block .block-desc[contenteditable="true"] {
    background: rgba(242,92,5,0.08); border-radius: 3px; padding: 1px 4px; cursor: text;
  }

  .block.connect-source { border-color: #22C55E; box-shadow: 0 0 0 3px rgba(34,197,94,0.3); }

  .block-delete {
    position: absolute; top: -8px; right: -8px;
    width: 20px; height: 20px; background: #EF4444; color: #FFF;
    border: none; border-radius: 50%; font-size: 12px; font-weight: 700;
    cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 12;
  }
  .block:hover .block-delete { display: flex; }

  /* 댓글 점 */
  .block-comment-btn {
    position: absolute; top: -4px; right: -4px;
    width: 8px; height: 8px; background: #B0BEC5;
    border: none; border-radius: 50%;
    cursor: pointer; z-index: 12;
    transition: transform 0.15s, background 0.15s;
  }
  .block-comment-btn:hover { transform: scale(1.5); background: #78909C; }
  .block-comment-btn.has-comments { background: #00B8D4; box-shadow: 0 0 6px rgba(0,184,212,0.5); }
  .block-comment-btn.has-comments:hover { background: #00E5FF; }
  /* 댓글 툴팁 */
  .block-comment-btn::after {
    content: '댓글달기';
    position: absolute; top: -28px; right: -10px;
    background: #334155; color: #FFF; font-size: 10px; font-weight: 600;
    padding: 3px 8px; border-radius: 4px; white-space: nowrap;
    opacity: 0; pointer-events: none; transition: opacity 0.15s;
  }
  .block-comment-btn:hover::after { opacity: 1; }
  .block-comment-btn.has-comments::after { content: '댓글 보기'; }

  /* 댓글 패널 */
  .comment-panel {
    position: fixed; top: 0; right: -380px; width: 380px; height: 100vh;
    background: #FFF; border-left: 2px solid #E2E8F0; z-index: 300;
    display: flex; flex-direction: column;
    transition: right 0.3s ease;
    box-shadow: -4px 0 20px rgba(0,0,0,0.08);
  }
  .comment-panel.open { right: 0; }
  .comment-panel-header {
    padding: 16px 20px; border-bottom: 1px solid #E2E8F0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .comment-panel-header h3 { font-size: 14px; font-weight: 800; color: #0F172A; }
  .comment-panel-close {
    background: none; border: none; font-size: 20px; cursor: pointer; color: #94A3B8;
  }
  .comment-list {
    flex: 1; overflow-y: auto; padding: 16px 20px;
  }
  .comment-item {
    background: #F8FAFC; border-radius: 10px; padding: 12px; margin-bottom: 10px;
  }
  .comment-item .comment-author {
    font-size: 12px; font-weight: 700; color: #F25C05; margin-bottom: 4px;
  }
  .comment-item .comment-text { font-size: 13px; color: #334155; line-height: 1.5; }
  .comment-item .comment-time { font-size: 10px; color: #94A3B8; margin-top: 4px; }
  .comment-input-area {
    padding: 16px 20px; border-top: 1px solid #E2E8F0;
  }
  .comment-input-area input[type="text"] {
    width: 100%; padding: 10px 12px; border: 2px solid #E2E8F0; border-radius: 10px;
    font-family: inherit; font-size: 13px; margin-bottom: 8px;
  }
  .comment-input-area input:focus { outline: none; border-color: #F25C05; }
  .comment-input-area textarea {
    width: 100%; padding: 10px 12px; border: 2px solid #E2E8F0; border-radius: 10px;
    font-family: inherit; font-size: 13px; resize: vertical; min-height: 60px;
  }
  .comment-input-area textarea:focus { outline: none; border-color: #F25C05; }
  .comment-submit {
    margin-top: 8px; width: 100%; padding: 10px;
    background: linear-gradient(90deg, #F25C05, #FE9A00); color: #FFF;
    border: none; border-radius: 10px; font-family: inherit;
    font-size: 13px; font-weight: 700; cursor: pointer;
  }

  .arrow-label {
    position: absolute; background: #F8F9FB; border: 1px solid #D8DCE2; border-radius: 4px;
    padding: 1px 7px; font-size: 10px; font-weight: 600; color: #64748B;
    z-index: 5; pointer-events: none; white-space: nowrap;
  }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #0F172A; color: #FFF; padding: 12px 24px; border-radius: 10px;
    font-size: 13px; font-weight: 700; opacity: 0; transition: all 0.3s ease; z-index: 400;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  .help-panel {
    position: fixed; bottom: 16px; right: 16px; background: #FFF;
    border: 1.5px solid #E2E8F0; border-radius: 10px; padding: 14px;
    font-size: 11px; color: #64748B; line-height: 1.8; z-index: 100;
    max-width: 240px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .help-panel b { color: #0F172A; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>AX 우선순위 보드</h1>
    <div class="hint">드래그로 배치 · 더블클릭으로 편집 · 점 클릭으로 의견 남기기</div>
  </div>
  <div class="header-actions">
    <button class="header-btn secondary" onclick="addBlock(false)">+ 하위 블록</button>
    <button class="header-btn secondary" onclick="addBlock(true)">+ 주요 블록</button>
    <button class="header-btn secondary" id="btnConnect" onclick="toggleConnectMode()">화살표 연결</button>
    <button class="header-btn danger" id="btnDelete" onclick="toggleDeleteMode()">화살표 삭제</button>
    <button class="header-btn primary" onclick="exportMermaid()">Mermaid 복사</button>
  </div>
</div>

<div class="mode-indicator" id="modeIndicator"></div>

<div class="board" id="board">
  <svg class="arrow-layer" id="arrowLayer">
    <defs>
      <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#B0B8C4"/></marker>
      <marker id="ah-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#EF4444"/></marker>
    </defs>
  </svg>
</div>

<!-- 댓글 패널 -->
<div class="comment-panel" id="commentPanel">
  <div class="comment-panel-header">
    <h3 id="commentPanelTitle">댓글</h3>
    <button class="comment-panel-close" onclick="closeComments()">×</button>
  </div>
  <div class="comment-list" id="commentList"></div>
  <div class="comment-input-area">
    <input type="text" id="commentAuthor" placeholder="이름 (예: Hannah)">
    <textarea id="commentText" placeholder="의견을 남겨주세요..."></textarea>
    <button class="comment-submit" onclick="submitComment()">의견 남기기</button>
  </div>
</div>

<div class="help-panel">
  <b>드래그</b> — 블록 이동<br>
  <b>더블클릭</b> — 텍스트 편집<br>
  <b>점 클릭</b> — 블록에 의견 남기기<br>
  <b>화살표 연결</b> — 블록 두 개 클릭<br>
  <b>화살표 삭제</b> — 화살표 클릭<br>
  <b>ESC</b> — 드래그 모드 복귀
</div>

<div class="toast" id="toast"></div>

<script>
// 이미지 기준 정확한 초기 레이아웃
const blocksData = [
  { id:'A', label:'ⅰ. 상위 목표 설정', desc:'— 달성하려는 임팩트가 뭔지', major:true, x:380, y:30 },
  { id:'A1', label:'하위 목표 설정', desc:'(예시: 수동 리소스 절감)', major:false, x:180, y:120 },
  { id:'A2', label:'As-Is 수치 산출 + 싱크', desc:'', major:false, x:30, y:220 },
  { id:'A3', label:'To-Be 기준선 합의', desc:'', major:false, x:230, y:220 },
  { id:'B', label:'ⅱ. 여태까지 한 것 중간 정리', desc:'+ 앞으로의 공유 체계 수립', major:true, x:650, y:120 },
  { id:'B1', label:'BizOps 진행 현황 한 판 정리', desc:'', major:false, x:420, y:220 },
  { id:'B4', label:'BizOps 추가 진행 영역 발굴', desc:'', major:false, x:610, y:220 },
  { id:'B5', label:'성공 사례 문서화', desc:'', major:false, x:810, y:220 },
  { id:'B6', label:'사용 도구 현황 파악', desc:'', major:false, x:980, y:220 },
  { id:'C', label:'ⅲ. 표준 워크플로우 정의', desc:'— 복제 가능한 매뉴얼 만들기', major:true, x:780, y:330 },
  { id:'D', label:'ⅳ. 총괄 어드민 체계 구성', desc:'— 언어·데이터·배포 통합 관리', major:true, x:560, y:440 },
  { id:'D1', label:'데이터 정의 및 마이그', desc:'', major:false, x:560, y:540 },
  { id:'D2', label:'총괄 어드민 완성', desc:'', major:false, x:560, y:620 },
  { id:'E', label:'ⅴ. 신규 영역 발굴 (CA, CX)', desc:'— 자동화 대상 식별', major:true, x:920, y:440 },
  { id:'F', label:'ⅵ. 담당자 할당→플래닝→착수', desc:'(공통 실행 사이클)', major:true, x:520, y:730 },
  { id:'F1', label:'담당자 할당', desc:'', major:false, x:440, y:830 },
  { id:'F2', label:'플래닝', desc:'', major:false, x:580, y:830 },
  { id:'F3', label:'착수 + 실행', desc:'', major:false, x:700, y:830 },
  { id:'B3', label:'방향성 맞는지 확인·소통', desc:'', major:false, x:900, y:900 },
];

let arrowsData = [
  { from:'A', to:'A1' }, { from:'A', to:'B' },
  { from:'A1', to:'A2' }, { from:'A1', to:'A3' },
  { from:'B', to:'B1' }, { from:'B', to:'B4' }, { from:'B', to:'B5' }, { from:'B', to:'B6' },
  { from:'B5', to:'C' }, { from:'B6', to:'C' },
  { from:'C', to:'D' },
  { from:'C', to:'E', label:'선행되면 도움될 것' },
  { from:'D', to:'D1' }, { from:'D1', to:'D2' },
  { from:'B4', to:'F', label:'BizOps 추가분' },
  { from:'E', to:'F', label:'CA/CX 신규분' },
  { from:'F', to:'F1' }, { from:'F1', to:'F2' }, { from:'F2', to:'F3' },
  { from:'F3', to:'B3', label:'결과를 다시 공유' },
];

// 댓글 데이터 (메모리 저장)
let commentsData = {};
let currentCommentBlock = null;

let mode = 'drag';
let connectSource = null;
let dragState = null;
let blockCounter = 200;

const board = document.getElementById('board');
const arrowLayer = document.getElementById('arrowLayer');

function renderBlock(b) {
  const div = document.createElement('div');
  div.className = `block ${b.major ? 'major' : 'minor'}`;
  div.id = `block-${b.id}`;
  div.style.left = b.x + 'px';
  div.style.top = b.y + 'px';

  const hasDesc = b.desc && b.desc.trim();
  div.innerHTML = `
    <button class="block-delete" onclick="deleteBlock('${b.id}')" title="삭제">×</button>
    <div class="block-comment-btn" onclick="openComments('${b.id}')"></div>
    <div class="block-label">${b.label}</div>
    ${hasDesc ? `<div class="block-desc">${b.desc}</div>` : `<div class="block-desc" style="display:none"></div>`}
  `;

  div.addEventListener('mousedown', (e) => onMouseDown(e, b));
  div.addEventListener('click', (e) => onBlockClick(e, b));
  div.addEventListener('dblclick', (e) => {
    e.stopPropagation();
    const lbl = div.querySelector('.block-label');
    const dsc = div.querySelector('.block-desc');
    lbl.contentEditable = 'true';
    dsc.style.display = 'block';
    dsc.contentEditable = 'true';
    lbl.focus();
    const done = () => {
      lbl.contentEditable = 'false';
      dsc.contentEditable = 'false';
      b.label = lbl.textContent.trim();
      b.desc = dsc.textContent.trim();
      if (!b.desc) dsc.style.display = 'none';
    };
    lbl.addEventListener('blur', () => setTimeout(done, 150), { once: true });
    dsc.addEventListener('blur', () => setTimeout(done, 150), { once: true });
  });

  board.appendChild(div);
  updateCommentBadge(b.id);
}

function renderAllBlocks() {
  document.querySelectorAll('.block').forEach(el => el.remove());
  blocksData.forEach(b => renderBlock(b));
}

function addBlock(major) {
  blockCounter++;
  const id = 'N' + blockCounter;
  const newB = { id, label: '새 블록', desc: '더블클릭으로 편집', major, x: 200 + board.scrollLeft, y: 150 + board.scrollTop };
  blocksData.push(newB);
  renderBlock(newB);
  showToast('블록 추가됨 — 더블클릭으로 편집하세요');
}

function deleteBlock(id) {
  const idx = blocksData.findIndex(b => b.id === id);
  if (idx === -1) return;
  blocksData.splice(idx, 1);
  arrowsData = arrowsData.filter(a => a.from !== id && a.to !== id);
  const el = document.getElementById(`block-${id}`);
  if (el) el.remove();
  delete commentsData[id];
  renderArrows();
}

function onMouseDown(e, block) {
  if (mode !== 'drag') return;
  if (e.target.contentEditable === 'true' || e.target.closest('.block-delete') || e.target.closest('.block-comment-btn')) return;
  e.preventDefault();
  const div = document.getElementById(`block-${block.id}`);
  const rect = div.getBoundingClientRect();
  dragState = { block, div, offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top };
  div.classList.add('dragging');
}

document.addEventListener('mousemove', (e) => {
  if (!dragState) return;
  const { block, div, offsetX, offsetY } = dragState;
  const br = board.getBoundingClientRect();
  block.x = Math.max(0, e.clientX - br.left + board.scrollLeft - offsetX);
  block.y = Math.max(0, e.clientY - br.top + board.scrollTop - offsetY);
  div.style.left = block.x + 'px';
  div.style.top = block.y + 'px';
  renderArrows();
});

document.addEventListener('mouseup', () => {
  if (dragState) { dragState.div.classList.remove('dragging'); dragState = null; }
});

function onBlockClick(e, block) {
  if (mode !== 'connect') return;
  e.stopPropagation();
  if (!connectSource) {
    connectSource = block;
    document.getElementById(`block-${block.id}`).classList.add('connect-source');
    showMode('두 번째 블록을 클릭하세요');
  } else {
    if (connectSource.id !== block.id) {
      if (!arrowsData.some(a => a.from === connectSource.id && a.to === block.id)) {
        arrowsData.push({ from: connectSource.id, to: block.id });
        renderArrows();
      }
    }
    document.querySelectorAll('.connect-source').forEach(el => el.classList.remove('connect-source'));
    connectSource = null;
    showMode('화살표 연결 모드 — 시작 블록 클릭');
  }
}

// 직각 화살표
function orthoPath(fR, tR) {
  const fCX = fR.x + fR.w/2, fCY = fR.y + fR.h/2;
  const tCX = tR.x + tR.w/2, tCY = tR.y + tR.h/2;
  const dy = tCY - fCY, dx = tCX - fCX;
  let sx, sy, ex, ey;

  if (Math.abs(dy) >= Math.abs(dx) * 0.3) {
    if (dy > 0) { sx=fCX; sy=fR.y+fR.h; ex=tCX; ey=tR.y; }
    else { sx=fCX; sy=fR.y; ex=tCX; ey=tR.y+tR.h; }
    const my = (sy+ey)/2;
    if (Math.abs(sx-ex)<4) return { d:`M${sx} ${sy}L${ex} ${ey}`, mx:(sx+ex)/2, my };
    return { d:`M${sx} ${sy}L${sx} ${my}L${ex} ${my}L${ex} ${ey}`, mx:(sx+ex)/2, my };
  } else {
    if (dx > 0) { sx=fR.x+fR.w; sy=fCY; ex=tR.x; ey=tCY; }
    else { sx=fR.x; sy=fCY; ex=tR.x+tR.w; ey=tCY; }
    const mx = (sx+ex)/2;
    if (Math.abs(sy-ey)<4) return { d:`M${sx} ${sy}L${ex} ${ey}`, mx, my:(sy+ey)/2 };
    return { d:`M${sx} ${sy}L${mx} ${sy}L${mx} ${ey}L${ex} ${ey}`, mx, my:(sy+ey)/2 };
  }
}

function renderArrows() {
  arrowLayer.querySelectorAll('path').forEach(el => el.remove());
  document.querySelectorAll('.arrow-label').forEach(el => el.remove());

  arrowsData.forEach((arrow, idx) => {
    const fD = document.getElementById(`block-${arrow.from}`);
    const tD = document.getElementById(`block-${arrow.to}`);
    if (!fD || !tD) return;

    const fR = { x:parseFloat(fD.style.left), y:parseFloat(fD.style.top), w:fD.offsetWidth, h:fD.offsetHeight };
    const tR = { x:parseFloat(tD.style.left), y:parseFloat(tD.style.top), w:tD.offsetWidth, h:tD.offsetHeight };
    const { d, mx, my } = orthoPath(fR, tR);

    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', d);
    p.setAttribute('stroke','#B0B8C4');
    p.setAttribute('stroke-width','1.5');
    p.setAttribute('fill','none');
    p.setAttribute('marker-end','url(#ah)');

    p.addEventListener('mouseenter', () => { if (mode==='delete') { p.setAttribute('stroke','#EF4444'); p.setAttribute('stroke-width','4'); p.setAttribute('marker-end','url(#ah-r)'); }});
    p.addEventListener('mouseleave', () => { if (mode==='delete') { p.setAttribute('stroke','#B0B8C4'); p.setAttribute('stroke-width','1.5'); p.setAttribute('marker-end','url(#ah)'); }});
    p.addEventListener('click', (e) => { if (mode==='delete') { e.stopPropagation(); arrowsData.splice(idx,1); renderArrows(); showToast('화살표 삭제됨'); }});

    arrowLayer.appendChild(p);

    if (arrow.label) {
      const lb = document.createElement('div');
      lb.className = 'arrow-label';
      lb.textContent = arrow.label;
      lb.style.left = (mx - 40) + 'px';
      lb.style.top = (my - 10) + 'px';
      board.appendChild(lb);
    }
  });
}

// 댓글 기능
function openComments(blockId) {
  currentCommentBlock = blockId;
  const b = blocksData.find(x => x.id === blockId);
  document.getElementById('commentPanelTitle').textContent = b ? `💬 ${b.label}` : '댓글';
  renderComments();
  document.getElementById('commentPanel').classList.add('open');
}

function closeComments() {
  document.getElementById('commentPanel').classList.remove('open');
  currentCommentBlock = null;
}

function renderComments() {
  const list = document.getElementById('commentList');
  const comments = commentsData[currentCommentBlock] || [];
  if (comments.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#94A3B8;padding:40px 0;font-size:13px;">아직 의견이 없습니다</div>';
  } else {
    list.innerHTML = comments.map(c => `
      <div class="comment-item">
        <div class="comment-author">${escapeHTML(c.author)}</div>
        <div class="comment-text">${escapeHTML(c.text)}</div>
        <div class="comment-time">${c.time}</div>
      </div>
    `).join('');
    list.scrollTop = list.scrollHeight;
  }
}

function submitComment() {
  if (!currentCommentBlock) return;
  const author = document.getElementById('commentAuthor').value.trim() || '익명';
  const text = document.getElementById('commentText').value.trim();
  if (!text) return;

  if (!commentsData[currentCommentBlock]) commentsData[currentCommentBlock] = [];
  const now = new Date();
  const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  commentsData[currentCommentBlock].push({ author, text, time: timeStr });

  document.getElementById('commentText').value = '';
  renderComments();
  updateCommentBadge(currentCommentBlock);
  showToast('의견이 등록되었습니다');
}

function updateCommentBadge(blockId) {
  const div = document.getElementById(`block-${blockId}`);
  if (!div) return;
  const btn = div.querySelector('.block-comment-btn');
  const count = (commentsData[blockId] || []).length;
  if (count > 0) {
    btn.classList.add('has-comments');
    btn.textContent = '';
  } else {
    btn.classList.remove('has-comments');
    btn.textContent = '';
  }
}

function escapeHTML(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function toggleConnectMode() {
  if (mode==='connect') { mode='drag'; connectSource=null; document.querySelectorAll('.connect-source').forEach(el=>el.classList.remove('connect-source')); document.getElementById('btnConnect').classList.remove('active'); hideMode(); }
  else { mode='connect'; document.getElementById('btnConnect').classList.add('active'); document.getElementById('btnDelete').classList.remove('active'); showMode('화살표 연결 모드 — 시작 블록 클릭'); }
}
function toggleDeleteMode() {
  if (mode==='delete') { mode='drag'; document.getElementById('btnDelete').classList.remove('active'); hideMode(); }
  else { mode='delete'; connectSource=null; document.querySelectorAll('.connect-source').forEach(el=>el.classList.remove('connect-source')); document.getElementById('btnDelete').classList.add('active'); document.getElementById('btnConnect').classList.remove('active'); showMode('화살표 삭제 모드 — 화살표 클릭'); }
}
function showMode(t) { document.getElementById('modeIndicator').textContent=t; document.getElementById('modeIndicator').classList.add('show'); }
function hideMode() { document.getElementById('modeIndicator').classList.remove('show'); }

function exportMermaid() {
  let m = 'flowchart TD\n';
  blocksData.forEach(b => {
    const l = b.desc ? `${b.label} ${b.desc}` : b.label;
    m += b.major ? `    ${b.id}["<b>${l}</b>"]\n` : `    ${b.id}["${l}"]\n`;
  });
  m += '\n';
  arrowsData.forEach(a => { m += a.label ? `    ${a.from} -->|"${a.label}"| ${a.to}\n` : `    ${a.from} --> ${a.to}\n`; });
  m += '\n';
  blocksData.forEach(b => { m += b.major ? `    style ${b.id} fill:#FFF4ED,stroke:#F25C05,stroke-width:2px,color:#0F172A\n` : `    style ${b.id} fill:#FFFFFF,stroke:#E2E8F0,color:#334155\n`; });
  navigator.clipboard.writeText(m).then(() => showToast('Mermaid 코드 복사 완료!')).catch(() => showToast('복사 실패'));
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    mode='drag'; connectSource=null;
    document.querySelectorAll('.connect-source').forEach(el=>el.classList.remove('connect-source'));
    document.getElementById('btnConnect').classList.remove('active');
    document.getElementById('btnDelete').classList.remove('active');
    hideMode();
    closeComments();
  }
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

renderAllBlocks();
renderArrows();
</script>
